name: Finish Exercise Japanese

on:
  workflow_call:
    inputs:
      issue-url:
        description: "更新して閉じる issue の URL"
        required: true
        type: string
      exercise-title:
        description: "演習のタイトル"
        required: false
        type: string
      update-readme-with-congratulations:
        description: "README を完了メッセージで更新するかどうか"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  issues: write

jobs:
  update_readme:
    name: Update README with congratulations
    runs-on: ubuntu-latest
    if: inputs.update-readme-with-congratulations

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Build congratulations message from template
        id: build-new-readme
        uses: skills/action-text-variables@v3
        with:
          template-file: .github/ja-templates/readme/exercise-finished.md
          template-vars: |
            login: ${{ github.actor }}
            issue_url: ${{ inputs.issue-url }}
            exercise_title: ${{ inputs.exercise-title }}
            repository_url: https://github.com/${{ github.repository }}

      - name: Overwrite README
        env:
          README_TEXT: ${{ steps.build-new-readme.outputs.updated-text }}
        run: echo "$README_TEXT" > README.md

      - name: Update README - congratulations
        uses: EndBug/add-and-commit@v9
        with:
          add: "README.md"
          message: "演習完了"
          default_author: github_actions

  finish_issue:
    name: Comment and close issue
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build message - exercise finished
        id: build-finish-message
        uses: skills/action-text-variables@v3
        with:
          template-file: .github/ja-templates/step-feedback/exercise-finished.md
          template-vars: |
            login: ${{ github.actor }}
            repo_full_name: ${{ github.repository }}

      - name: Create comment - exercise finished
        run: |
          gh issue comment "${{ inputs.issue-url }}" \
            --body "${{ steps.build-finish-message.outputs.updated-text }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close issue
        run: gh issue close "${{ inputs.issue-url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
