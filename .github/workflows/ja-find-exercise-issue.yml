name: Find Exercise Issue Japanese

on:
  workflow_call:
    inputs:
      issue-title-text:
        description: 'Text to search for within issue titles'
        required: false
        default: 'Exercise'
        type: string
    outputs:
      issue-url:
        description: 'URL of the found issue'
        value: ${{ jobs.find_exercise.outputs.issue-url }}
      issue-number:
        description: 'Number of the found issue'
        value: ${{ jobs.find_exercise.outputs.issue-number }}

permissions:
  issues: read

jobs:
  find_exercise:
    name: Find exercise by issue title
    runs-on: ubuntu-latest

    outputs:
      issue-url: ${{ steps.find-exercise-issue.outputs.ISSUE_URL }}
      issue-number: ${{ steps.find-exercise-issue.outputs.ISSUE_NUMBER }}

    steps:
      - id: find-exercise-issue
        uses: actions/github-script@v7
        env:
          ISSUE_TITLE_TEXT: ${{ inputs.issue-title-text }}
        with:
          script: |
            const response = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              sort: 'created',
              direction: 'desc',
              per_page: 50
            });

            const issues = response.data.filter(item => !item.pull_request);

            core.startGroup(`Found ${issues.length} issues in total`);
            issues.forEach(issue => {
              core.info(`#${issue.number}: ${issue.title} (${issue.html_url})`);
            });
            core.endGroup();

            const issue = issues.find(issue => issue.title.includes(process.env.ISSUE_TITLE_TEXT));
            if (!issue) {
              throw new Error(`No exercise issue found for title text: ${process.env.ISSUE_TITLE_TEXT}`);
            }
            core.info(`Exercise issue found: #${issue.number} (${issue.html_url})`);

            core.setOutput('ISSUE_URL', issue.html_url);
            core.setOutput('ISSUE_NUMBER', issue.number);
